  server:
    port: 8080

  spring:
    datasource:
      url: ${DB_URL}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver

    jpa:
      hibernate:
        ddl-auto: validate
      show-sql: true
      properties:
        hibernate:
          format_sql: true
      open-in-view: false

    liquibase:
      change-log: classpath:db/changelog/db.changelog-master.yaml
      enabled: true

  logging:
    level:
      org.springframework: INFO
      org.hibernate.SQL: DEBUG
      org.hibernate.type.descriptor.sql.BasicBinder: TRACE

  springdoc:
    api-docs:
      enabled: true
    swagger-ui:
      enabled: true

  jwt:
    secret: verySecretKeyForJwtDontUseInProd
    expiration: 3600000
