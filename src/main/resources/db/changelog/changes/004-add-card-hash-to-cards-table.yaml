databaseChangeLog:
  - changeSet:
      id: 004-add-card-hash-to-cards
      author: rockprogstar
      changes:
        - addColumn:
            tableName: cards
            columns:
              - column:
                  name: card_hash
                  type: varchar(255)

  - changeSet:
      id: 004-add-unique-constraint-card-hash
      author: rockprogstar
      changes:
        - addUniqueConstraint:
            tableName: cards
            columnNames: card_hash
            constraintName: uk_cards_card_hash
